name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0.1'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix react-native-gradle-plugin path
        run: |
          if [ ! -d "node_modules/react-native-gradle-plugin" ]; then
            PLUGIN=$(find node_modules/react-native -maxdepth 5 -name "react-native-gradle-plugin" -type d 2>/dev/null | head -1)
            if [ -n "$PLUGIN" ]; then
              echo "Found plugin inside react-native at: $PLUGIN"
              cp -r "$(realpath $PLUGIN)" node_modules/react-native-gradle-plugin
            else
              echo "Plugin not found inside react-native, searching everywhere..."
              PLUGIN=$(find node_modules -maxdepth 5 -name "react-native-gradle-plugin" -type d 2>/dev/null | head -1)
              if [ -n "$PLUGIN" ]; then
                cp -r "$(realpath $PLUGIN)" node_modules/react-native-gradle-plugin
              fi
            fi
          fi

      - name: Patch Kotlin version in react-native-gradle-plugin
        run: |
          for f in node_modules/react-native-gradle-plugin/build.gradle.kts node_modules/react-native-gradle-plugin/build.gradle; do
            if [ -f "$f" ]; then
              sed -i 's/kotlin("jvm") version "[0-9\.]*"/kotlin("jvm") version "1.8.0"/g' "$f"
              sed -i 's/kotlin_version = "[0-9\.]*"/kotlin_version = "1.8.0"/g' "$f"
              sed -i 's/"org.jetbrains.kotlin:kotlin-gradle-plugin:[0-9\.]*"/"org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.0"/g' "$f"
              echo "Patched: $f"
              grep -n "kotlin" "$f" | head -5 || true
            fi
          done

      - name: Build Android APK
        run: |
          cd android
          gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
